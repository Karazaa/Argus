name: Nightly

on:
   workflow_dispatch:
   schedule:
     - cron: "0 6 * * *"

jobs: 
  non-unity-job:
    runs-on: self-hosted
    steps:
      - name: Validating Non-Unity Build
        shell: powershell
        run: Start-process -FilePath "${{ secrets.PATH_TO_RUN_UBT }}" -ArgumentList "${{ secrets.PATH_TO_UPROJECT }} Win64 Development ArgusEditor -DisableAdaptiveUnity -DisableUnity -NoPCH -NoSharedPCH" -NoNewWindow -Wait
  
  build: 
    runs-on: self-hosted
    needs:
      - non-unity-job
    steps:
      - name: Cook, Stage & Package UE Project
        uses: OrchidIsle/UE5-Build-Project@latest
        with:
          RUNUAT_PATH: ${{ secrets.PATH_TO_RUN_UAT }}
          UPROJECT_PATH: ${{ secrets.PATH_TO_UPROJECT }}
          BUILD_CONFIG: Development
          PLATFORM: Win64
          CLEAN: true
          COOK: true
          STAGE: true
          PACKAGE: true
          ARCHIVE: true
          ARCHIVE_PATH: ${{ secrets.PATH_TO_ARCHIVE_DIR }}
          NULLRHI: true
          EDITOR: true

name: Hello World

on:
  workflow_dispatch:

jobs:
  hello-job:
    runs-on: self-hosted
    steps:
      - name: hello-world
        run: echo "Hello World!"

  goodbye-job:
    runs-on: self-hosted
    needs:
      - hello-job
    steps:
      - name: goodbye-world
        run: echo "Goodbye World!"

  non-unity-job:
    runs-on: self-hosted
    needs: 
      - goodbye-job
    steps:
      - name: Making non-unity build
        shell: cmd
        run: start /B ${{ secrets.PATH_TO_RUN_UBT }} "${{ secrets.PATH_TO_UPROJECT }}" Win64 Development ArgusEditor -DisableAdaptiveUnity -DisableUnity -NoPCH -NoSharedPCH

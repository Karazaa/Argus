name: Hello World

on:
  workflow_dispatch:

env:
  PATH_TO_REPO: C:/Users/treym/GameDevelopment/Argus/

jobs:
  hello-job:
    runs-on: self-hosted
    steps:
      - name: hello-world
        run: echo "Hello World!"

  goodbye-job:
    runs-on: self-hosted
    needs:
      - hello-job
    steps:
      - name: goodbye-world
        run: echo "Goodbye World!"

  pull:
    runs-on: self-hosted
    needs:
      - goodbye-job
    steps:
      - name: git-pull
        run: git -C $PATH_TO_REPO pull

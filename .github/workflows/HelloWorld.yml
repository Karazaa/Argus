name: Hello World

on:
  workflow_dispatch:

jobs:
  non-unity-job:
    runs-on: self-hosted
    steps:
      - name: Making non-unity build
        shell: powershell
        run: |
          $command = "& `"${{ secrets.PATH_TO_RUN_UBT }}`" `"${{ secrets.PATH_TO_UPROJECT }}`" Win64 Development ArgusEditor -DisableAdaptiveUnity -DisableUnity -NoPCH -NoSharedPCH"
          Invoke-Expression $command
